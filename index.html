<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>COP â USD Calculator</title>
    <meta name="description" content="Convert Colombian Pesos to US Dollars with live exchange rates">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header .flags {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .rate-banner {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .rate-banner .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .rate-banner .rate {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4aa;
        }

        .rate-banner .updated {
            font-size: 0.72rem;
            opacity: 0.5;
            margin-top: 4px;
        }

        .offline-badge {
            display: inline-block;
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.4);
            color: #ffc107;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .offline-badge.hidden { display: none; }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 28px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .input-group label .flag {
            font-size: 1.2rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .input-group input:focus {
            border-color: #00d4aa;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -8px auto 12px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.25s;
            color: #fff;
        }

        .swap-btn:hover, .swap-btn:active {
            background: #00d4aa;
            border-color: #00d4aa;
            transform: rotate(180deg);
        }

        .result-display {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.25);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            margin-top: 8px;
        }

        .result-display .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .result-display .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4aa;
            word-break: break-all;
        }

        .error-msg {
            text-align: center;
            padding: 12px;
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #ff7b7b;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            opacity: 0.4;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #00d4aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00d4aa;
            color: #1a1a2e;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.4);
            z-index: 100;
            display: none;
            border: none;
            white-space: nowrap;
        }

        .install-prompt:active {
            transform: translateX(-50%) scale(0.96);
        }

        @media (max-width: 400px) {
            .header h1 { font-size: 1.4rem; }
            .card { padding: 20px 16px; }
            .input-group input { font-size: 1.2rem; padding: 14px; }
            .result-display .result-value { font-size: 1.6rem; }
        }

        @media (min-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .rate-banner .rate { font-size: 1.6rem; }
        }

        @media (display-mode: standalone) {
            body { padding-top: calc(env(safe-area-inset-top, 20px) + 10px); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="flags">&#127464;&#127476; &#127482;&#127480;</div>
        <h1>COP &#8596; USD</h1>
    </div>

    <div class="rate-banner">
        <div class="label">Live Exchange Rate</div>
        <div class="rate" id="liverate">Loading... <span class="loading-spinner"></span></div>
        <div class="updated" id="updated"></div>
        <div class="offline-badge hidden" id="offline-badge">Using saved rate</div>
    </div>

    <div class="card">
        <div class="input-group" id="from-group">
            <label><span class="flag">&#127464;&#127476;</span> <span id="from-label">Colombian Pesos (COP)</span></label>
            <input type="text" id="from-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <button class="swap-btn" id="swap-btn" title="Swap currencies">&#8693;</button>

        <div class="input-group" id="to-group">
            <label><span class="flag">&#127482;&#127480;</span> <span id="to-label">US Dollars (USD)</span></label>
            <input type="text" id="to-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <div class="result-display">
            <div class="result-label" id="result-label">Converted Amount</div>
            <div class="result-value" id="result-value">&#8212;</div>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="footer">
        Rates from ExchangeRate API &middot; Updates every 30 min
    </div>
</div>

<button class="install-prompt" id="install-btn">&#9889; Install App</button>

<script>
    var API_URL = 'https://api.exchangerate-api.com/v4/latest/USD';
    var STORAGE_KEY = 'cop_usd_saved_rate';

    var rate = null;
    var direction = 'COP_USD';
    var isOfflineRate = false;

    var fromInput  = document.getElementById('from-input');
    var toInput    = document.getElementById('to-input');
    var fromLabel  = document.getElementById('from-label');
    var toLabel    = document.getElementById('to-label');
    var fromGroup  = document.getElementById('from-group');
    var toGroup    = document.getElementById('to-group');
    var swapBtn    = document.getElementById('swap-btn');
    var liveRate   = document.getElementById('liverate');
    var updatedEl  = document.getElementById('updated');
    var resultVal  = document.getElementById('result-value');
    var resultLbl  = document.getElementById('result-label');
    var errorMsg   = document.getElementById('error-msg');
    var offlineBadge = document.getElementById('offline-badge');
    var installBtn = document.getElementById('install-btn');

    /* ---------- Saved Rate (localStorage) ---------- */

    function saveRate(copRate) {
        var data = {
            rate: copRate,
            timestamp: new Date().toISOString()
        };
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) { /* storage full or unavailable */ }
    }

    function loadSavedRate() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return null;
            return JSON.parse(raw);
        } catch (e) { return null; }
    }

    /* ---------- Fetch Live Rate ---------- */

    function fetchRate() {
        fetch(API_URL)
            .then(function(res) {
                if (!res.ok) throw new Error('API error');
                return res.json();
            })
            .then(function(data) {
                rate = data.rates.COP;

                // Save to localStorage for offline use
                saveRate(rate);
                isOfflineRate = false;

                liveRate.textContent = '1 USD = ' + formatNumber(rate, 2) + ' COP';
                var now = new Date();
                updatedEl.textContent = 'Updated ' + now.toLocaleString();
                offlineBadge.classList.add('hidden');
                errorMsg.style.display = 'none';

                convert();
            })
            .catch(function() {
                // Try loading the saved rate
                var saved = loadSavedRate();
                if (saved && saved.rate) {
                    rate = saved.rate;
                    isOfflineRate = true;

                    liveRate.textContent = '1 USD = ' + formatNumber(rate, 2) + ' COP';
                    var savedDate = new Date(saved.timestamp);
                    updatedEl.textContent = 'Saved ' + savedDate.toLocaleString();
                    offlineBadge.classList.remove('hidden');
                    errorMsg.style.display = 'none';

                    convert();
                } else {
                    liveRate.textContent = 'Unavailable';
                    showError('No internet and no saved rate. Connect once to cache the rate.');
                }
            });
    }

    /* ---------- Formatting ---------- */

    function formatNumber(n, decimals) {
        return n.toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function parseInput(val) {
        return parseFloat(val.replace(/[^0-9.\-]/g, ''));
    }

    /* ---------- Conversion ---------- */

    function convert(source) {
        if (!rate) return;

        if (source === 'to') {
            var val = parseInput(toInput.value);
            if (isNaN(val)) { resultVal.innerHTML = '&#8212;'; return; }

            var result;
            if (direction === 'COP_USD') {
                result = val * rate;
                fromInput.value = formatNumber(result, 0);
                resultVal.textContent = '$' + formatNumber(val, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                result = val / rate;
                fromInput.value = formatNumber(result, 2);
                resultVal.textContent = '$' + formatNumber(val, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        } else {
            var val2 = parseInput(fromInput.value);
            if (isNaN(val2)) { resultVal.innerHTML = '&#8212;'; return; }

            var result2;
            if (direction === 'COP_USD') {
                result2 = val2 / rate;
                toInput.value = formatNumber(result2, 2);
                resultVal.textContent = '$' + formatNumber(result2, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                result2 = val2 * rate;
                toInput.value = formatNumber(result2, 0);
                resultVal.textContent = '$' + formatNumber(result2, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        }
    }

    /* ---------- Swap ---------- */

    swapBtn.addEventListener('click', function() {
        direction = direction === 'COP_USD' ? 'USD_COP' : 'COP_USD';

        if (direction === 'COP_USD') {
            fromLabel.textContent = 'Colombian Pesos (COP)';
            toLabel.textContent   = 'US Dollars (USD)';
            fromGroup.querySelector('.flag').innerHTML = '&#127464;&#127476;';
            toGroup.querySelector('.flag').innerHTML   = '&#127482;&#127480;';
        } else {
            fromLabel.textContent = 'US Dollars (USD)';
            toLabel.textContent   = 'Colombian Pesos (COP)';
            fromGroup.querySelector('.flag').innerHTML = '&#127482;&#127480;';
            toGroup.querySelector('.flag').innerHTML   = '&#127464;&#127476;';
        }

        var temp = fromInput.value;
        fromInput.value = toInput.value;
        toInput.value = temp;

        convert('from');
    });

    fromInput.addEventListener('input', function() { convert('from'); });
    toInput.addEventListener('input', function() { convert('to'); });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    /* ---------- Online/Offline Events ---------- */

    window.addEventListener('online', function() {
        fetchRate();
    });

    window.addEventListener('offline', function() {
        if (rate) {
            offlineBadge.classList.remove('hidden');
        }
    });

    /* ---------- PWA Install Prompt ---------- */

    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });
    });

    window.addEventListener('appinstalled', function() {
        installBtn.style.display = 'none';
    });

    /* ---------- Service Worker ---------- */

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    /* ---------- Start ---------- */

    fetchRate();
    setInterval(fetchRate, 30 * 60 * 1000);
</script>

</body>
</html>
