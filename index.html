<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>COP ↔ USD Calculator</title>
    <meta name="description" content="Convert Colombian Pesos to US Dollars with live exchange rates">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Share+Tech+Mono&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --grad-color1: #0a0a1a;
            --grad-color2: #1a0a2e;
            --accent: #cc0000;
            --accent-glow: rgba(204, 0, 0, 0.4);
            --text-primary: #d0d0d0;
            --text-bright: #ffffff;
            --panel-bg: rgba(10, 10, 20, 0.85);
        }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, var(--grad-color1) 0%, var(--grad-color2) 100%);
            color: var(--text-primary);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center;
            padding: 12px;
            padding-top: env(safe-area-inset-top, 12px);
            padding-bottom: calc(env(safe-area-inset-bottom, 12px) + 70px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none; z-index: 9999;
        }
        body::after {
            content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 24px;
            background: repeating-linear-gradient(90deg, var(--accent) 0px, var(--accent) 4px, transparent 4px, transparent 16px);
            opacity: 0.6; z-index: 10;
        }
        .container { width: 100%; max-width: 520px; position: relative; }
        .header { text-align: center; margin-bottom: 14px; padding: 10px 0; position: relative; }
        .header::before, .header::after {
            content: ''; position: absolute; left: 0; right: 0; height: 2px;
            background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
        }
        .header::before { top: 0; }
        .header::after { bottom: 0; }
        .header .flags { font-size: 1.4rem; margin-bottom: 2px; letter-spacing: 12px; opacity: 0.8; }
        .header h1 {
            font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900;
            color: var(--text-bright); letter-spacing: 6px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow), 0 2px 4px rgba(0,0,0,0.8);
        }
        .nav-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .nav-tab {
            flex: 1; background: var(--accent); color: #000; text-align: center;
            padding: 6px 4px; font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; cursor: default;
            clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
        }
        .nav-tab.active { background: var(--text-bright); color: #000; }
        .rate-banner {
            background: var(--panel-bg); border: 1px solid var(--accent);
            padding: 12px 14px; text-align: center; margin-bottom: 10px; position: relative;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        .rate-banner::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 6px; height: 6px; background: var(--accent); box-shadow: 0 0 6px var(--accent);
        }
        .rate-banner::after {
            content: ''; position: absolute; bottom: 0; right: 0;
            width: 6px; height: 6px; background: var(--accent); box-shadow: 0 0 6px var(--accent);
        }
        .rate-banner .label {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); margin-bottom: 4px;
        }
        .rate-banner .rate {
            font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700;
            color: var(--text-bright); text-shadow: 0 0 10px var(--accent-glow);
        }
        .rate-banner .updated { font-size: 0.6rem; opacity: 0.4; margin-top: 3px; letter-spacing: 1px; }
        .offline-badge {
            display: inline-block; background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.5); color: #ffc107;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; padding: 2px 10px; margin-top: 4px;
        }
        .offline-badge.hidden { display: none; }
        .card {
            background: var(--panel-bg); border: 1px solid var(--accent);
            padding: 20px 16px; position: relative;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
        }
        .card::before {
            content: ''; position: absolute; top: 4px; left: 4px;
            width: 20px; height: 20px;
            border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
            box-shadow: -2px -2px 6px var(--accent-glow);
        }
        .card::after {
            content: ''; position: absolute; bottom: 4px; right: 4px;
            width: 20px; height: 20px;
            border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent);
            box-shadow: 2px 2px 6px var(--accent-glow);
        }
        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; color: var(--accent); margin-bottom: 5px;
        }
        .input-group label .flag { font-size: 1rem; }
        .input-group input {
            width: 100%; padding: 12px 14px; font-family: 'Cinzel', serif;
            font-size: 1.5rem; font-weight: 700;
            border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
            background: rgba(0,0,0,0.6); color: var(--text-bright);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow);
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.15); font-family: 'Share Tech Mono', monospace; }
        .swap-btn {
            display: flex; align-items: center; justify-content: center;
            margin: -2px auto 6px; width: 42px; height: 42px;
            border: 1px solid var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent);
            cursor: pointer; font-size: 1.1rem; transition: all 0.25s; color: var(--accent);
            clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
        }
        .swap-btn:hover, .swap-btn:active {
            background: var(--accent); color: #000;
            transform: rotate(180deg); box-shadow: 0 0 20px var(--accent-glow);
        }
        .result-display {
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
            padding: 14px; text-align: center; margin-top: 10px; position: relative;
        }
        .result-display::before {
            content: '>'; position: absolute; left: 8px; top: 50%;
            transform: translateY(-50%); color: var(--accent); font-size: 0.8rem;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .result-display .result-label {
            font-size: 0.62rem; text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); margin-bottom: 3px;
        }
        .result-display .result-value {
            font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900;
            color: var(--text-bright); text-shadow: 0 0 12px var(--accent-glow);
            word-break: break-all;
        }
        .error-msg {
            text-align: center; padding: 10px; background: rgba(255,82,82,0.1);
            border: 1px solid rgba(255,82,82,0.4); margin-top: 10px;
            font-size: 0.72rem; color: #ff7b7b; display: none;
        }
        .theme-panel {
            background: var(--panel-bg);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
            padding: 14px 16px; margin-top: 10px;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }
        .theme-panel .tp-title {
            font-family: 'Cinzel', serif; font-size: 0.68rem;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--accent); margin-bottom: 10px; text-align: center;
        }
        .tp-section { margin-bottom: 8px; }
        .tp-section-label {
            font-size: 0.58rem; text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255,255,255,0.35); margin-bottom: 6px;
        }
        .theme-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .theme-row label {
            font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255,255,255,0.5); min-width: 65px;
        }
        .theme-row input[type="color"] {
            -webkit-appearance: none; appearance: none;
            width: 36px; height: 24px; border: 1px solid var(--accent);
            background: none; cursor: pointer; padding: 0;
        }
        .theme-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
        .theme-row input[type="color"]::-webkit-color-swatch { border: none; }
        .gradient-preview {
            height: 5px; border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); margin-top: 4px;
        }
        .accent-preview { height: 5px; margin-top: 4px; }
        .theme-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .theme-preset {
            width: 28px; height: 28px; border-radius: 3px;
            border: 2px solid rgba(255,255,255,0.15); cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
        }
        .theme-preset:hover, .theme-preset:active { border-color: var(--text-bright); transform: scale(1.15); }
        .theme-preset.active-preset { border-color: var(--text-bright); box-shadow: 0 0 8px rgba(255,255,255,0.3); }
        .footer {
            text-align: center; margin-top: 14px; margin-bottom: 10px;
            font-size: 0.58rem; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase;
        }
        .loading-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid color-mix(in srgb, var(--accent) 20%, transparent);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .install-prompt {
            position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff;
            padding: 10px 24px; font-family: 'Cinzel', serif; font-weight: 700;
            font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 0 25px var(--accent-glow); z-index: 100;
            display: none; border: 1px solid var(--accent);
            clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
        }
        .install-prompt:active { transform: translateX(-50%) scale(0.96); }
        @media (max-width: 420px) {
            body { padding: 8px; padding-bottom: calc(env(safe-area-inset-bottom, 8px) + 70px); }
            .header { margin-bottom: 10px; padding: 8px 0; }
            .header .flags { font-size: 1.1rem; letter-spacing: 8px; }
            .header h1 { font-size: 1.6rem; letter-spacing: 3px; }
            .nav-tabs { gap: 3px; margin-bottom: 8px; }
            .nav-tab { font-size: 0.6rem; padding: 5px 2px; letter-spacing: 0.5px; }
            .rate-banner { padding: 10px 12px; }
            .rate-banner .label { font-size: 0.6rem; letter-spacing: 2px; }
            .rate-banner .rate { font-size: 1.15rem; }
            .card { padding: 16px 12px; }
            .input-group { margin-bottom: 10px; }
            .input-group label { font-size: 0.65rem; letter-spacing: 1.5px; }
            .input-group input { font-size: 1.25rem; padding: 10px 12px; }
            .swap-btn { width: 36px; height: 36px; font-size: 1rem; }
            .result-display { padding: 12px; }
            .result-display .result-value { font-size: 1.4rem; }
            .theme-panel { padding: 10px 12px; }
            .theme-preset { width: 24px; height: 24px; }
            .install-prompt { font-size: 0.7rem; padding: 8px 18px; bottom: 30px; }
        }
        @media (max-width: 340px) {
            .header h1 { font-size: 1.3rem; letter-spacing: 2px; }
            .rate-banner .rate { font-size: 1rem; }
            .input-group input { font-size: 1.1rem; padding: 9px 10px; }
            .result-display .result-value { font-size: 1.2rem; }
        }
        @media (min-width: 600px) {
            .header h1 { font-size: 2.6rem; }
            .rate-banner .rate { font-size: 1.8rem; }
        }
        @media (display-mode: standalone) {
            body { padding-top: calc(env(safe-area-inset-top, 12px) + 10px); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-tabs">
        <div class="nav-tab active">Exchange</div>
        <div class="nav-tab">COP</div>
        <div class="nav-tab">USD</div>
        <div class="nav-tab">Live</div>
    </div>
    <div class="header">
        <div class="flags">&#127464;&#127476; &#127482;&#127480;</div>
        <h1>COP &#8596; USD</h1>
    </div>
    <div class="rate-banner">
        <div class="label">Live Exchange Rate</div>
        <div class="rate" id="liverate">Loading... <span class="loading-spinner"></span></div>
        <div class="updated" id="updated"></div>
        <div class="offline-badge hidden" id="offline-badge">// Using saved rate</div>
    </div>
    <div class="card">
        <div class="input-group" id="from-group">
            <label><span class="flag">&#127464;&#127476;</span> <span id="from-label">Colombian Pesos (COP)</span></label>
            <input type="text" id="from-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>
        <button class="swap-btn" id="swap-btn" title="Swap currencies">&#8693;</button>
        <div class="input-group" id="to-group">
            <label><span class="flag">&#127482;&#127480;</span> <span id="to-label">US Dollars (USD)</span></label>
            <input type="text" id="to-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>
        <div class="result-display">
            <div class="result-label" id="result-label">Converted Amount</div>
            <div class="result-value" id="result-value">&#8212;</div>
        </div>
        <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="theme-panel">
        <div class="tp-title">Theme Customization</div>
        <div class="tp-section">
            <div class="tp-section-label">UI Accent Color</div>
            <div class="theme-row">
                <label>Accent</label>
                <input type="color" id="accent-color" value="#cc0000">
            </div>
            <div class="accent-preview" id="accent-preview"></div>
            <div class="theme-presets" id="presets">
                <div class="theme-preset" data-color="#cc0000" style="background:#cc0000" title="Red"></div>
                <div class="theme-preset" data-color="#00cc88" style="background:#00cc88" title="Emerald"></div>
                <div class="theme-preset" data-color="#0088ff" style="background:#0088ff" title="Blue"></div>
                <div class="theme-preset" data-color="#cc00cc" style="background:#cc00cc" title="Magenta"></div>
                <div class="theme-preset" data-color="#ff8800" style="background:#ff8800" title="Orange"></div>
                <div class="theme-preset" data-color="#cccc00" style="background:#cccc00" title="Gold"></div>
                <div class="theme-preset" data-color="#00cccc" style="background:#00cccc" title="Cyan"></div>
                <div class="theme-preset" data-color="#ffffff" style="background:#ffffff" title="White"></div>
            </div>
        </div>
        <div class="tp-section">
            <div class="tp-section-label">Background Gradient</div>
            <div class="theme-row">
                <label>Color 1</label>
                <input type="color" id="grad1" value="#0a0a1a">
            </div>
            <div class="theme-row">
                <label>Color 2</label>
                <input type="color" id="grad2" value="#1a0a2e">
            </div>
            <div class="gradient-preview" id="grad-preview"></div>
        </div>
    </div>
    <div class="footer">Rates via ExchangeRate API &middot; Auto-refresh 30m</div>
</div>
<button class="install-prompt" id="install-btn">&#9889; Install App</button>
<script>
    var API_URL = 'https://api.exchangerate-api.com/v4/latest/USD';
    var STORAGE_KEY = 'cop_usd_saved_rate';
    var THEME_KEY = 'cop_usd_theme';
    var rate = null;
    var direction = 'COP_USD';

    var fromInput = document.getElementById('from-input');
    var toInput = document.getElementById('to-input');
    var fromLabel = document.getElementById('from-label');
    var toLabel = document.getElementById('to-label');
    var fromGroup = document.getElementById('from-group');
    var toGroup = document.getElementById('to-group');
    var swapBtn = document.getElementById('swap-btn');
    var liveRate = document.getElementById('liverate');
    var updatedEl = document.getElementById('updated');
    var resultVal = document.getElementById('result-value');
    var resultLbl = document.getElementById('result-label');
    var errorMsg = document.getElementById('error-msg');
    var offlineBadge = document.getElementById('offline-badge');
    var installBtn = document.getElementById('install-btn');
    var grad1 = document.getElementById('grad1');
    var grad2 = document.getElementById('grad2');
    var gradPreview = document.getElementById('grad-preview');
    var accentColor = document.getElementById('accent-color');
    var accentPreview = document.getElementById('accent-preview');
    var presets = document.getElementById('presets');

    function hexToRgba(hex, alpha) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function applyTheme() {
        var c1 = grad1.value;
        var c2 = grad2.value;
        var ac = accentColor.value;
        var root = document.documentElement;
        root.style.setProperty('--grad-color1', c1);
        root.style.setProperty('--grad-color2', c2);
        root.style.setProperty('--accent', ac);
        root.style.setProperty('--accent-glow', hexToRgba(ac, 0.4));
        document.body.style.background = 'linear-gradient(135deg, ' + c1 + ' 0%, ' + c2 + ' 100%)';
        gradPreview.style.background = 'linear-gradient(90deg, ' + c1 + ', ' + c2 + ')';
        accentPreview.style.background = ac;
        var all = presets.querySelectorAll('.theme-preset');
        for (var i = 0; i < all.length; i++) {
            if (all[i].getAttribute('data-color').toLowerCase() === ac.toLowerCase()) {
                all[i].classList.add('active-preset');
            } else {
                all[i].classList.remove('active-preset');
            }
        }
        try { localStorage.setItem(THEME_KEY, JSON.stringify({ c1: c1, c2: c2, accent: ac })); } catch(e) {}
    }

    function loadTheme() {
        try {
            var raw = localStorage.getItem(THEME_KEY);
            if (raw) {
                var t = JSON.parse(raw);
                if (t.c1) grad1.value = t.c1;
                if (t.c2) grad2.value = t.c2;
                if (t.accent) accentColor.value = t.accent;
            }
        } catch(e) {}
        applyTheme();
    }

    grad1.addEventListener('input', applyTheme);
    grad2.addEventListener('input', applyTheme);
    accentColor.addEventListener('input', applyTheme);
    presets.addEventListener('click', function(e) {
        var el = e.target.closest('.theme-preset');
        if (!el) return;
        var c = el.getAttribute('data-color');
        if (c) { accentColor.value = c; applyTheme(); }
    });
    loadTheme();

    function saveRate(copRate) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ rate: copRate, timestamp: new Date().toISOString() })); } catch (e) {}
    }
    function loadSavedRate() {
        try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
    }

    function fetchRate() {
        fetch(API_URL).then(function(res) {
            if (!res.ok) throw new Error('API error');
            return res.json();
        }).then(function(data) {
            rate = data.rates.COP;
            saveRate(rate);
            liveRate.textContent = '1 USD = ' + formatNumber(rate, 2) + ' COP';
            updatedEl.textContent = 'Updated ' + new Date().toLocaleString();
            offlineBadge.classList.add('hidden');
            errorMsg.style.display = 'none';
            convert();
        }).catch(function() {
            var saved = loadSavedRate();
            if (saved && saved.rate) {
                rate = saved.rate;
                liveRate.textContent = '1 USD = ' + formatNumber(rate, 2) + ' COP';
                updatedEl.textContent = 'Saved ' + new Date(saved.timestamp).toLocaleString();
                offlineBadge.classList.remove('hidden');
                errorMsg.style.display = 'none';
                convert();
            } else {
                liveRate.textContent = 'Unavailable';
                showError('No internet and no saved rate. Connect once to cache.');
            }
        });
    }

    function formatNumber(n, d) {
        return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function parseInput(v) { return parseFloat(v.replace(/[^0-9.\-]/g, '')); }

    function convert(source) {
        if (!rate) return;
        if (source === 'to') {
            var v = parseInput(toInput.value);
            if (isNaN(v)) { resultVal.innerHTML = '&#8212;'; return; }
            if (direction === 'COP_USD') {
                fromInput.value = formatNumber(v * rate, 0);
                resultVal.textContent = '$' + formatNumber(v, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                fromInput.value = formatNumber(v / rate, 2);
                resultVal.textContent = '$' + formatNumber(v, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        } else {
            var v2 = parseInput(fromInput.value);
            if (isNaN(v2)) { resultVal.innerHTML = '&#8212;'; return; }
            if (direction === 'COP_USD') {
                toInput.value = formatNumber(v2 / rate, 2);
                resultVal.textContent = '$' + formatNumber(v2 / rate, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                toInput.value = formatNumber(v2 * rate, 0);
                resultVal.textContent = '$' + formatNumber(v2 * rate, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        }
    }

    swapBtn.addEventListener('click', function() {
        direction = direction === 'COP_USD' ? 'USD_COP' : 'COP_USD';
        if (direction === 'COP_USD') {
            fromLabel.textContent = 'Colombian Pesos (COP)';
            toLabel.textContent = 'US Dollars (USD)';
            fromGroup.querySelector('.flag').innerHTML = '&#127464;&#127476;';
            toGroup.querySelector('.flag').innerHTML = '&#127482;&#127480;';
        } else {
            fromLabel.textContent = 'US Dollars (USD)';
            toLabel.textContent = 'Colombian Pesos (COP)';
            fromGroup.querySelector('.flag').innerHTML = '&#127482;&#127480;';
            toGroup.querySelector('.flag').innerHTML = '&#127464;&#127476;';
        }
        var tmp = fromInput.value; fromInput.value = toInput.value; toInput.value = tmp;
        convert('from');
    });
    fromInput.addEventListener('input', function() { convert('from'); });
    toInput.addEventListener('input', function() { convert('to'); });
    function showError(m) { errorMsg.textContent = m; errorMsg.style.display = 'block'; }
    window.addEventListener('online', function() { fetchRate(); });
    window.addEventListener('offline', function() { if (rate) offlineBadge.classList.remove('hidden'); });

    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() { deferredPrompt = null; installBtn.style.display = 'none'; });
    });
    window.addEventListener('appinstalled', function() { installBtn.style.display = 'none'; });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    fetchRate();
    setInterval(fetchRate, 30 * 60 * 1000);
</script>
</body>
</html>
