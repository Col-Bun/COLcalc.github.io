<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>COP / JPY ↔ USD Calculator</title>
    <meta name="description" content="Convert Colombian Pesos or Japanese Yen to US Dollars with live exchange rates">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Share+Tech+Mono&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --grad-color1: #0a0a1a;
            --grad-color2: #1a0a2e;
            --accent: #cc0000;
            --accent-glow: rgba(204, 0, 0, 0.4);
            --text-primary: #d0d0d0;
            --text-bright: #ffffff;
            --panel-bg: rgba(10, 10, 20, 0.85);
            --border-color: var(--accent);
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, var(--grad-color1) 0%, var(--grad-color2) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            padding-top: env(safe-area-inset-top, 12px);
            padding-bottom: env(safe-area-inset-bottom, 12px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* === SCANLINES OVERLAY === */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* === RED GRID DOTS === */
        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                var(--accent) 0px,
                var(--accent) 4px,
                transparent 4px,
                transparent 16px
            );
            opacity: 0.6;
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: 16px;
            padding: 12px 0;
            position: relative;
        }

        .header::before, .header::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .header::before { top: 0; }
        .header::after { bottom: 0; }

        .header .flags {
            font-size: 1.4rem;
            margin-bottom: 2px;
            letter-spacing: 12px;
            opacity: 0.8;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-bright);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow), 0 2px 4px rgba(0,0,0,0.8);
        }

        /* === TOP NAV TABS (Silver Case style) === */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .nav-tab {
            flex: 1;
            background: var(--accent);
            color: #000;
            text-align: center;
            padding: 6px 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: default;
            clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
        }
        .nav-tab.active {
            background: var(--text-bright);
            color: #000;
        }

        /* === RATE BANNER === */
        .rate-banner {
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            padding: 14px 16px;
            text-align: center;
            margin-bottom: 12px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }

        .rate-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 6px; height: 6px;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .rate-banner::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 6px; height: 6px;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .rate-banner .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .rate-banner .rate {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-bright);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .rate-banner .updated {
            font-size: 0.65rem;
            opacity: 0.4;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .offline-badge {
            display: inline-block;
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.5);
            color: #ffc107;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 2px 10px;
            margin-top: 6px;
        }
        .offline-badge.hidden { display: none; }

        /* === MAIN CARD === */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            padding: 24px 20px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
        }

        /* Corner decorations */
        .card::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px;
            width: 20px; height: 20px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
            box-shadow: -2px -2px 6px var(--accent-glow);
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 4px; right: 4px;
            width: 20px; height: 20px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            box-shadow: 2px 2px 6px var(--accent-glow);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .input-group label .flag {
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 700;
            border: 1px solid rgba(204, 0, 0, 0.4);
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-bright);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px rgba(204, 0, 0, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.15);
            font-family: 'Share Tech Mono', monospace;
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -4px auto 8px;
            width: 44px;
            height: 44px;
            border: 1px solid var(--accent);
            background: rgba(204, 0, 0, 0.1);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.25s;
            color: var(--accent);
            clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
        }

        .swap-btn:hover, .swap-btn:active {
            background: var(--accent);
            color: #000;
            transform: rotate(180deg);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .result-display {
            background: rgba(204, 0, 0, 0.08);
            border: 1px solid rgba(204, 0, 0, 0.3);
            padding: 16px;
            text-align: center;
            margin-top: 12px;
            position: relative;
        }

        .result-display::before {
            content: '>';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 0.8rem;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .result-display .result-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .result-display .result-value {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-bright);
            text-shadow: 0 0 12px var(--accent-glow);
            word-break: break-all;
        }

        .error-msg {
            text-align: center;
            padding: 10px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.4);
            margin-top: 12px;
            font-size: 0.75rem;
            color: #ff7b7b;
            display: none;
        }

        /* === GRADIENT PICKER === */
        .gradient-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(204, 0, 0, 0.3);
            padding: 14px 16px;
            margin-top: 12px;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .gradient-panel .gp-title {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 10px;
            text-align: center;
        }

        .gradient-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .gradient-row label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            min-width: 70px;
        }

        .gradient-row input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 24px;
            border: 1px solid var(--accent);
            background: none;
            cursor: pointer;
            padding: 0;
        }
        .gradient-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
        .gradient-row input[type="color"]::-webkit-color-swatch { border: none; }

        .gradient-preview {
            height: 6px;
            border: 1px solid rgba(204, 0, 0, 0.3);
            margin-top: 4px;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.6rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* === LOADING === */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(204, 0, 0, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === CURRENCY MODE TOGGLE === */
        .currency-toggle-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .currency-toggle {
            display: flex;
            border: 1px solid var(--accent);
            overflow: hidden;
            clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 50%, calc(100% - 6px) 100%, 6px 100%, 0 50%);
        }

        .currency-toggle-btn {
            padding: 7px 22px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            outline: none;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .currency-toggle-btn.active {
            background: var(--accent);
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        .currency-toggle-btn:not(.active):hover {
            background: rgba(204,0,0,0.15);
            color: rgba(255,255,255,0.7);
        }

        /* === INSTALL BUTTON === */
        .install-prompt {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 10px 24px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 25px var(--accent-glow);
            z-index: 100;
            display: none;
            border: 1px solid var(--accent);
            clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
        }
        .install-prompt:active {
            transform: translateX(-50%) scale(0.96);
        }

        /* === RESPONSIVE === */
        @media (max-width: 400px) {
            .header h1 { font-size: 1.6rem; letter-spacing: 3px; }
            .card { padding: 18px 14px; }
            .input-group input { font-size: 1.3rem; padding: 12px; }
            .result-display .result-value { font-size: 1.5rem; }
            .nav-tab { font-size: 0.6rem; padding: 5px 2px; }
        }

        @media (min-width: 600px) {
            .header h1 { font-size: 2.6rem; }
            .rate-banner .rate { font-size: 1.8rem; }
        }

        @media (display-mode: standalone) {
            body { padding-top: calc(env(safe-area-inset-top, 12px) + 10px); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Silver Case nav tabs -->
    <div class="nav-tabs">
        <div class="nav-tab active">Exchange</div>
        <div class="nav-tab">COP</div>
        <div class="nav-tab">USD</div>
        <div class="nav-tab">Live</div>
    </div>

    <div class="header">
        <div class="flags" id="header-flags">&#127464;&#127476; &#127482;&#127480;</div>
        <h1 id="header-title">COP &#8596; USD</h1>
    </div>

    <!-- Currency mode toggle -->
    <div class="currency-toggle-wrap">
        <div class="currency-toggle">
            <button class="currency-toggle-btn active" id="toggle-cop" onclick="setCurrencyMode('COP')">
                &#127464;&#127476; COP
            </button>
            <button class="currency-toggle-btn" id="toggle-jpy" onclick="setCurrencyMode('JPY')">
                &#127471;&#127477; JPY
            </button>
        </div>
    </div>

    <div class="rate-banner">
        <div class="label">Live Exchange Rate</div>
        <div class="rate" id="liverate">Loading... <span class="loading-spinner"></span></div>
        <div class="updated" id="updated"></div>
        <div class="offline-badge hidden" id="offline-badge">// Using saved rate</div>
    </div>

    <div class="card">
        <div class="input-group" id="from-group">
            <label><span class="flag">&#127464;&#127476;</span> <span id="from-label">Colombian Pesos (COP)</span></label>
            <input type="text" id="from-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <button class="swap-btn" id="swap-btn" title="Swap currencies">&#8693;</button>

        <div class="input-group" id="to-group">
            <label><span class="flag">&#127482;&#127480;</span> <span id="to-label">US Dollars (USD)</span></label>
            <input type="text" id="to-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <div class="result-display">
            <div class="result-label" id="result-label">Converted Amount</div>
            <div class="result-value" id="result-value">&#8212;</div>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Gradient Picker -->
    <div class="gradient-panel">
        <div class="gp-title">Background Gradient</div>
        <div class="gradient-row">
            <label>Color 1</label>
            <input type="color" id="grad1" value="#0a0a1a">
        </div>
        <div class="gradient-row">
            <label>Color 2</label>
            <input type="color" id="grad2" value="#1a0a2e">
        </div>
        <div class="gradient-preview" id="grad-preview"></div>
    </div>

    <div class="footer">
        Rates via ExchangeRate API &middot; Auto-refresh 30m
    </div>
</div>

<button class="install-prompt" id="install-btn">Install App</button>

<script>
    var API_URL = 'https://api.exchangerate-api.com/v4/latest/USD';
    var STORAGE_KEY = 'cop_usd_saved_rate';
    var GRAD_KEY    = 'cop_usd_gradient';

    // Rates for both currencies (per 1 USD)
    var rates = { COP: null, JPY: null };
    var direction    = 'FROM_USD';  // 'FROM_USD' = foreign -> USD, 'TO_USD' = USD -> foreign
    var currencyMode = 'COP';       // 'COP' or 'JPY'
    var isOfflineRate = false;

    var fromInput    = document.getElementById('from-input');
    var toInput      = document.getElementById('to-input');
    var fromLabel    = document.getElementById('from-label');
    var toLabel      = document.getElementById('to-label');
    var fromGroup    = document.getElementById('from-group');
    var toGroup      = document.getElementById('to-group');
    var swapBtn      = document.getElementById('swap-btn');
    var liveRate     = document.getElementById('liverate');
    var updatedEl    = document.getElementById('updated');
    var resultVal    = document.getElementById('result-value');
    var resultLbl    = document.getElementById('result-label');
    var errorMsg     = document.getElementById('error-msg');
    var offlineBadge = document.getElementById('offline-badge');
    var installBtn   = document.getElementById('install-btn');
    var grad1        = document.getElementById('grad1');
    var grad2        = document.getElementById('grad2');
    var gradPreview  = document.getElementById('grad-preview');
    var headerFlags  = document.getElementById('header-flags');
    var headerTitle  = document.getElementById('header-title');

    // Currency config
    var CURRENCIES = {
        COP: { code: 'COP', name: 'Colombian Pesos', flag: '&#127464;&#127476;', decimals: 0, prefix: '' },
        JPY: { code: 'JPY', name: 'Japanese Yen',    flag: '&#127471;&#127477;', decimals: 0, prefix: '¥' }
    };

    /* ---------- Gradient Picker ---------- */

    function applyGradient() {
        var c1 = grad1.value, c2 = grad2.value;
        document.documentElement.style.setProperty('--grad-color1', c1);
        document.documentElement.style.setProperty('--grad-color2', c2);
        document.body.style.background = 'linear-gradient(135deg,' + c1 + ' 0%,' + c2 + ' 100%)';
        gradPreview.style.background   = 'linear-gradient(90deg,' + c1 + ',' + c2 + ')';
        try { localStorage.setItem(GRAD_KEY, JSON.stringify({ c1: c1, c2: c2 })); } catch(e) {}
    }

    function loadGradient() {
        try {
            var raw = localStorage.getItem(GRAD_KEY);
            if (raw) { var g = JSON.parse(raw); grad1.value = g.c1; grad2.value = g.c2; }
        } catch(e) {}
        applyGradient();
    }

    grad1.addEventListener('input', applyGradient);
    grad2.addEventListener('input', applyGradient);
    loadGradient();

    /* ---------- Saved Rates (localStorage) ---------- */

    function saveRates(copRate, jpyRate) {
        var data = { cop: copRate, jpy: jpyRate, timestamp: new Date().toISOString() };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    }

    function loadSavedRates() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
    }

    /* ---------- Rate Banner Update ---------- */

    function updateRateBanner() {
        var cur = CURRENCIES[currencyMode];
        var r   = rates[currencyMode];
        if (r) {
            liveRate.textContent = '1 USD = ' + formatNumber(r, 2) + ' ' + cur.code;
        }
    }

    /* ---------- Fetch Live Rate ---------- */

    function fetchRate() {
        fetch(API_URL)
            .then(function(res) {
                if (!res.ok) throw new Error('API error');
                return res.json();
            })
            .then(function(data) {
                rates.COP = data.rates.COP;
                rates.JPY = data.rates.JPY;
                saveRates(rates.COP, rates.JPY);
                isOfflineRate = false;
                updateRateBanner();
                var now = new Date();
                updatedEl.textContent = 'Updated ' + now.toLocaleString();
                offlineBadge.classList.add('hidden');
                errorMsg.style.display = 'none';
                convert();
            })
            .catch(function() {
                var saved = loadSavedRates();
                if (saved && saved.cop && saved.jpy) {
                    rates.COP = saved.cop;
                    rates.JPY = saved.jpy;
                    isOfflineRate = true;
                    updateRateBanner();
                    var savedDate = new Date(saved.timestamp);
                    updatedEl.textContent = 'Saved ' + savedDate.toLocaleString();
                    offlineBadge.classList.remove('hidden');
                    errorMsg.style.display = 'none';
                    convert();
                } else {
                    liveRate.textContent = 'Unavailable';
                    showError('No internet and no saved rate. Connect once to cache.');
                }
            });
    }

    /* ---------- Formatting ---------- */

    function formatNumber(n, decimals) {
        return n.toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function parseInput(val) {
        return parseFloat(val.replace(/[^0-9.-]/g, ''));
    }

    /* ---------- Currency Mode Toggle ---------- */

    function setCurrencyMode(mode) {
        currencyMode = mode;
        direction = 'FROM_USD';

        var cur = CURRENCIES[mode];

        document.getElementById('toggle-cop').classList.toggle('active', mode === 'COP');
        document.getElementById('toggle-jpy').classList.toggle('active', mode === 'JPY');

        headerFlags.innerHTML = cur.flag + ' &#127482;&#127480;';
        headerTitle.innerHTML = cur.code + ' &#8596; USD';

        fromLabel.textContent = cur.name + ' (' + cur.code + ')';
        toLabel.textContent   = 'US Dollars (USD)';
        fromGroup.querySelector('.flag').innerHTML = cur.flag;
        toGroup.querySelector('.flag').innerHTML   = '&#127482;&#127480;';

        updateRateBanner();

        fromInput.value = '';
        toInput.value   = '';
        resultVal.innerHTML = '&#8212;';
        resultLbl.textContent = 'Converted Amount';
        errorMsg.style.display = 'none';
    }

    /* ---------- Conversion ---------- */

    function convert(source) {
        var r = rates[currencyMode];
        if (!r) return;
        var cur = CURRENCIES[currencyMode];

        if (direction === 'FROM_USD') {
            if (source === 'to') {
                var usdVal = parseInput(toInput.value);
                if (isNaN(usdVal)) { resultVal.innerHTML = '&#8212;'; return; }
                var foreign = usdVal * r;
                fromInput.value = formatNumber(foreign, cur.decimals);
                resultVal.textContent = cur.prefix + formatNumber(foreign, cur.decimals) + ' ' + cur.code;
                resultLbl.textContent = cur.name;
            } else {
                var foreignVal = parseInput(fromInput.value);
                if (isNaN(foreignVal)) { resultVal.innerHTML = '&#8212;'; return; }
                var usd = foreignVal / r;
                toInput.value = formatNumber(usd, 2);
                resultVal.textContent = '$' + formatNumber(usd, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            }
        } else {
            if (source === 'to') {
                var fVal = parseInput(toInput.value);
                if (isNaN(fVal)) { resultVal.innerHTML = '&#8212;'; return; }
                var usdRes = fVal / r;
                fromInput.value = formatNumber(usdRes, 2);
                resultVal.textContent = '$' + formatNumber(usdRes, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                var usdVal2 = parseInput(fromInput.value);
                if (isNaN(usdVal2)) { resultVal.innerHTML = '&#8212;'; return; }
                var foreignRes = usdVal2 * r;
                toInput.value = formatNumber(foreignRes, cur.decimals);
                resultVal.textContent = cur.prefix + formatNumber(foreignRes, cur.decimals) + ' ' + cur.code;
                resultLbl.textContent = cur.name;
            }
        }
    }

    /* ---------- Swap ---------- */

    swapBtn.addEventListener('click', function() {
        var cur = CURRENCIES[currencyMode];
        if (direction === 'FROM_USD') {
            direction = 'TO_USD';
            fromLabel.textContent = 'US Dollars (USD)';
            toLabel.textContent   = cur.name + ' (' + cur.code + ')';
            fromGroup.querySelector('.flag').innerHTML = '&#127482;&#127480;';
            toGroup.querySelector('.flag').innerHTML   = cur.flag;
        } else {
            direction = 'FROM_USD';
            fromLabel.textContent = cur.name + ' (' + cur.code + ')';
            toLabel.textContent   = 'US Dollars (USD)';
            fromGroup.querySelector('.flag').innerHTML = cur.flag;
            toGroup.querySelector('.flag').innerHTML   = '&#127482;&#127480;';
        }
        var temp = fromInput.value;
        fromInput.value = toInput.value;
        toInput.value = temp;
        convert('from');
    });

    fromInput.addEventListener('input', function() { convert('from'); });
    toInput.addEventListener('input', function()   { convert('to'); });

    function showError(msg) {
        errorMsg.textContent   = msg;
        errorMsg.style.display = 'block';
    }

    /* ---------- Online/Offline Events ---------- */

    window.addEventListener('online',  function() { fetchRate(); });
    window.addEventListener('offline', function() {
        if (rates[currencyMode]) offlineBadge.classList.remove('hidden');
    });

    /* ---------- PWA Install Prompt ---------- */

    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });
    });
    window.addEventListener('appinstalled', function() {
        installBtn.style.display = 'none';
    });

    /* ---------- Service Worker ---------- */

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    /* ---------- Start ---------- */

    fetchRate();
    setInterval(fetchRate, 30 * 60 * 1000);
</script>

</body>
</html>
