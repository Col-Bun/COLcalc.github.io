<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COP ↔ USD Calculator</title>
    <meta name="description" content="Convert Colombian Pesos to US Dollars with live exchange rates">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header .flags {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .rate-banner {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .rate-banner .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .rate-banner .rate {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4aa;
        }

        .rate-banner .updated {
            font-size: 0.72rem;
            opacity: 0.5;
            margin-top: 4px;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 28px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .input-group label .flag {
            font-size: 1.2rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #00d4aa;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -8px auto 12px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.25s;
            color: #fff;
        }

        .swap-btn:hover {
            background: #00d4aa;
            border-color: #00d4aa;
            transform: rotate(180deg);
        }

        .result-display {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.25);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            margin-top: 8px;
        }

        .result-display .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .result-display .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4aa;
            word-break: break-all;
        }

        .error-msg {
            text-align: center;
            padding: 12px;
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #ff7b7b;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            opacity: 0.4;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #00d4aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 400px) {
            .header h1 { font-size: 1.4rem; }
            .card { padding: 20px 16px; }
            .input-group input { font-size: 1.2rem; padding: 14px; }
            .result-display .result-value { font-size: 1.6rem; }
        }

        @media (min-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .rate-banner .rate { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="flags">🇨🇴 🇺🇸</div>
        <h1>COP ↔ USD</h1>
    </div>

    <div class="rate-banner">
        <div class="label">Live Exchange Rate</div>
        <div class="rate" id="liverate">Loading... <span class="loading-spinner"></span></div>
        <div class="updated" id="updated"></div>
    </div>

    <div class="card">
        <div class="input-group" id="from-group">
            <label><span class="flag">🇨🇴</span> <span id="from-label">Colombian Pesos (COP)</span></label>
            <input type="text" id="from-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <button class="swap-btn" id="swap-btn" title="Swap currencies">⇅</button>

        <div class="input-group" id="to-group">
            <label><span class="flag">🇺🇸</span> <span id="to-label">US Dollars (USD)</span></label>
            <input type="text" id="to-input" inputmode="decimal" placeholder="0" autocomplete="off">
        </div>

        <div class="result-display">
            <div class="result-label" id="result-label">Converted Amount</div>
            <div class="result-value" id="result-value">—</div>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="footer">
        Rates from ExchangeRate API · Updates daily
    </div>
</div>

<script>
    const API_URL = 'https://api.exchangerate-api.com/v4/latest/USD';

    let rate = null;
    let direction = 'COP_USD';

    const fromInput  = document.getElementById('from-input');
    const toInput    = document.getElementById('to-input');
    const fromLabel  = document.getElementById('from-label');
    const toLabel    = document.getElementById('to-label');
    const fromGroup  = document.getElementById('from-group');
    const toGroup    = document.getElementById('to-group');
    const swapBtn    = document.getElementById('swap-btn');
    const liveRate   = document.getElementById('liverate');
    const updatedEl  = document.getElementById('updated');
    const resultVal  = document.getElementById('result-value');
    const resultLbl  = document.getElementById('result-label');
    const errorMsg   = document.getElementById('error-msg');

    async function fetchRate() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('API error');
            const data = await res.json();
            rate = data.rates.COP;

            liveRate.textContent = '1 USD = ' + formatNumber(rate, 2) + ' COP';
            const now = new Date();
            updatedEl.textContent = 'Updated ' + now.toLocaleString();
            errorMsg.style.display = 'none';

            convert();
        } catch (e) {
            liveRate.textContent = 'Unavailable';
            showError('Could not fetch live rate. Check your internet connection.');
        }
    }

    function formatNumber(n, decimals) {
        return n.toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function parseInput(val) {
        return parseFloat(val.replace(/[^0-9.\-]/g, ''));
    }

    function convert(source) {
        if (!rate) return;

        if (source === 'to') {
            const val = parseInput(toInput.value);
            if (isNaN(val)) { resultVal.textContent = '—'; return; }

            let result;
            if (direction === 'COP_USD') {
                result = val * rate;
                fromInput.value = formatNumber(result, 0);
                resultVal.textContent = '$' + formatNumber(val, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                result = val / rate;
                fromInput.value = formatNumber(result, 2);
                resultVal.textContent = '$' + formatNumber(val, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        } else {
            const val = parseInput(fromInput.value);
            if (isNaN(val)) { resultVal.textContent = '—'; return; }

            let result;
            if (direction === 'COP_USD') {
                result = val / rate;
                toInput.value = formatNumber(result, 2);
                resultVal.textContent = '$' + formatNumber(result, 2) + ' USD';
                resultLbl.textContent = 'US Dollars';
            } else {
                result = val * rate;
                toInput.value = formatNumber(result, 0);
                resultVal.textContent = '$' + formatNumber(result, 0) + ' COP';
                resultLbl.textContent = 'Colombian Pesos';
            }
        }
    }

    swapBtn.addEventListener('click', () => {
        direction = direction === 'COP_USD' ? 'USD_COP' : 'COP_USD';

        if (direction === 'COP_USD') {
            fromLabel.textContent = 'Colombian Pesos (COP)';
            toLabel.textContent   = 'US Dollars (USD)';
            fromGroup.querySelector('.flag').textContent = '🇨🇴';
            toGroup.querySelector('.flag').textContent   = '🇺🇸';
        } else {
            fromLabel.textContent = 'US Dollars (USD)';
            toLabel.textContent   = 'Colombian Pesos (COP)';
            fromGroup.querySelector('.flag').textContent = '🇺🇸';
            toGroup.querySelector('.flag').textContent   = '🇨🇴';
        }

        const temp = fromInput.value;
        fromInput.value = toInput.value;
        toInput.value = temp;

        convert('from');
    });

    fromInput.addEventListener('input', () => convert('from'));
    toInput.addEventListener('input', () => convert('to'));

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    fetchRate();
    setInterval(fetchRate, 30 * 60 * 1000);
</script>

</body>
</html>
